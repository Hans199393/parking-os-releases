name: Release Parking.OS

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Wersja (np. v2026.1.8)'
        required: true
        default: 'v2026.1.8'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (NSIS + MSI)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: npm run tauri build

      - name: Collect artifacts
        id: artifacts
        shell: pwsh
        run: |
          $nsis = Get-ChildItem "src-tauri\target\release\bundle\nsis\*-setup.exe" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $nzip = Get-ChildItem "src-tauri\target\release\bundle\nsis\*-setup.nsis.zip" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $nsig = Get-ChildItem "src-tauri\target\release\bundle\nsis\*-setup.exe.sig" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $zsig = Get-ChildItem "src-tauri\target\release\bundle\nsis\*-setup.nsis.zip.sig" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          echo "NSIS: $($nsis?.FullName)"
          echo "NSIS ZIP: $($nzip?.FullName)"
          echo "nsis_path=$($nsis?.FullName)" >> $env:GITHUB_OUTPUT
          echo "nzip_path=$($nzip?.FullName)" >> $env:GITHUB_OUTPUT
          echo "nsig_path=$($nsig?.FullName)" >> $env:GITHUB_OUTPUT
          echo "zsig_path=$($zsig?.FullName)" >> $env:GITHUB_OUTPUT

      - name: Generate latest.json for updater
        id: latest_json
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag) { $tag = "${{ inputs.tag }}" }
          $version = $tag -replace '^v', ''
          $nsis = Get-ChildItem "src-tauri\target\release\bundle\nsis\*-setup.exe" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $nzip = Get-ChildItem "src-tauri\target\release\bundle\nsis\*-setup.nsis.zip" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $nsig = Get-ChildItem "src-tauri\target\release\bundle\nsis\*-setup.exe.sig" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $zsig = Get-ChildItem "src-tauri\target\release\bundle\nsis\*-setup.nsis.zip.sig" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          $requiredPaths = [ordered]@{
            nsis = $nsis?.FullName
            nzip = $nzip?.FullName
            nsig = $nsig?.FullName
            zsig = $zsig?.FullName
          }

          foreach ($entry in $requiredPaths.GetEnumerator()) {
            Write-Host ("{0}: {1}" -f $entry.Key, $entry.Value)
            if (-not $entry.Value) {
              throw "Missing required updater artifact: $($entry.Key)"
            }
            if (-not (Test-Path $entry.Value)) {
              throw "Updater artifact path does not exist: $($entry.Value)"
            }
          }

          $nsisName = Split-Path $requiredPaths.nsis -Leaf
          $nzipName = Split-Path $requiredPaths.nzip -Leaf
          $nsigContent = Get-Content $requiredPaths.nsig -Raw
          $zsigContent = Get-Content $requiredPaths.zsig -Raw
          $repo = "${{ github.repository }}"
          $now  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $json = @{
            version  = $version
            notes    = "Parking.OS $version"
            pub_date = $now
            platforms = @{
              "windows-x86_64-nsis" = @{
                signature = $zsigContent.Trim()
                url       = "https://github.com/$repo/releases/download/$tag/$nzipName"
              }
              "windows-x86_64" = @{
                signature = $nsigContent.Trim()
                url       = "https://github.com/$repo/releases/download/$tag/$nsisName"
              }
            }
          } | ConvertTo-Json -Depth 5

          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText((Join-Path $PWD 'latest.json'), $json, $utf8NoBom)
          Write-Host "Generated latest.json:"
          Get-Content "latest.json"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: Parking.OS ${{ github.ref_name || inputs.tag }}
          body: |
            ## Parking.OS ${{ github.ref_name || inputs.tag }}

            ### Instalacja
            1. Pobierz plik `-setup.exe`
            2. Uruchom jako administrator lub użytkownik (instalacja dla bieżącego użytkownika)
            3. Pierwsze uruchomienie — zaloguj się danymi Supabase

            ### Aktualizacja
            - Aplikacja sprawdza aktualizacje automatycznie przy starcie
            - Można też użyć Ustawienia → System → Sprawdź aktualizacje
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.nsis.zip
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            src-tauri/target/release/bundle/nsis/*-setup.nsis.zip.sig
            latest.json
          overwrite_files: true
          generate_release_notes: false
