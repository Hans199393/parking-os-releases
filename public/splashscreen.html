<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parking.OS — ładowanie</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0f17;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Tło z gradientem i siatką ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 90% 70% at 50% -10%, rgba(245,158,11,.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 110%, rgba(234,88,12,.10) 0%, transparent 50%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,158,11,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,158,11,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── Logo container ── */
  .logo-wrap {
    position: relative;
    margin-bottom: 28px;
    animation: floatIn .7s cubic-bezier(.22,1,.36,1) both;
  }

  .logo-glow {
    position: absolute;
    inset: -30px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,158,11,.35) 0%, transparent 70%);
    animation: pulseGlow 2.5s ease-in-out infinite;
    pointer-events: none;
  }

  .logo-wrap img {
    width: 110px;
    height: 110px;
    object-fit: contain;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 0 24px rgba(245,158,11,.6));
  }

  /* ── Nazwa aplikacji ── */
  .app-name {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fcd34d 0%, #f59e0b 40%, #ea580c 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
    animation: floatIn .7s .15s cubic-bezier(.22,1,.36,1) both;
  }

  .app-version {
    font-size: 12px;
    color: rgba(245,158,11,.45);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 44px;
    animation: floatIn .7s .25s cubic-bezier(.22,1,.36,1) both;
  }

  /* ── Pasek ładowania ── */
  .progress-wrap {
    width: 260px;
    animation: floatIn .6s .35s cubic-bezier(.22,1,.36,1) both;
  }

  .progress-label {
    font-size: 11px;
    color: rgba(245,158,11,.5);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: center;
    font-weight: 600;
  }

  .progress-track {
    width: 100%;
    height: 4px;
    background: rgba(245,158,11,.12);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #f59e0b, #fcd34d, #ea580c);
    border-radius: 2px;
    width: 0%;
    transition: width .4s ease;
    position: relative;
  }

  .progress-bar::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 40px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.4));
    animation: shimmer 1.2s ease-in-out infinite;
  }

  /* ── Status text ── */
  .status-text {
    font-size: 12px;
    color: rgba(245,158,11,.4);
    margin-top: 16px;
    text-align: center;
    min-height: 16px;
    transition: opacity .3s;
    letter-spacing: .5px;
  }

  /* ── Animacje ── */
  @keyframes floatIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulseGlow {
    0%, 100% { opacity: .7; transform: scale(1); }
    50%       { opacity: 1; transform: scale(1.1); }
  }

  @keyframes shimmer {
    0%   { transform: translateX(-40px); opacity: 0; }
    50%  { opacity: 1; }
    100% { transform: translateX(0px); opacity: 0; }
  }
</style>
</head>
<body>

<div class="logo-wrap">
  <div class="logo-glow"></div>
  <img src="logo2026.png" alt="Parking.OS Logo" id="logo" onerror="this.style.display='none'">
</div>

<div class="app-name">Parking.OS</div>
<div class="app-version">wersja 2026.1</div>

<div class="progress-wrap">
  <div class="progress-label" id="step-label">Inicjalizacja…</div>
  <div class="progress-track">
    <div class="progress-bar" id="bar"></div>
  </div>
  <div class="status-text" id="status-text">Uruchamianie aplikacji…</div>
</div>

<script>
  const bar = document.getElementById('bar');
  const label = document.getElementById('step-label');
  const status = document.getElementById('status-text');

  const steps = [
    { pct: 15,  text: 'Ładowanie interfejsu…',        sub: 'React · Tailwind · Komponenty' },
    { pct: 35,  text: 'Inicjalizacja bazy danych…',   sub: 'SQLite · Migracje' },
    { pct: 55,  text: 'Łączenie z Supabase…',         sub: 'Sprawdzanie połączenia' },
    { pct: 75,  text: 'Wczytywanie ustawień…',        sub: 'Motyw · Kamery · Preferencje' },
    { pct: 92,  text: 'Finalizing…',                  sub: 'Prawie gotowe' },
    { pct: 100, text: 'Gotowe',                        sub: 'Witaj w Parking.OS' },
  ];

  let i = 0;
  function next() {
    if (i >= steps.length) return;
    const s = steps[i++];
    bar.style.width = s.pct + '%';
    label.textContent = s.text;
    status.textContent = s.sub;
    if (i < steps.length) {
      setTimeout(next, 320 + Math.random() * 200);
    }
  }

  // Start po krótkim opóźnieniu (czas na renderowanie)
  setTimeout(next, 200);
</script>
</body>
</html>
